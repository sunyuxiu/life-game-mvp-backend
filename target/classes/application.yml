server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/life_game?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

app:
  jwt:
    secret: lifegame-mvp-jwt-secret-key-must-be-at-least-256-bits-long
    expiration: 86400000

logging:
  level:
    com.lifegame.mvp: DEBUG
